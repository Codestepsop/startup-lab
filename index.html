<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="style.css">
  
  <title>Startup Lab</title>
</head>


<body>

   <div class="container">
    <div class="cards">

  <div class="card">
    <h3>Agenda</h3>
    <p>Gerenciamento de horários e encaixes.</p>
  </div>

  <div class="card">
    <h3>WhatsApp</h3>
    <p>Automação de mensagens e confirmações.</p>
  </div>

</div>

    <h1>Startup Lab 🚀</h1>

    <p>
      Construindo soluções para profissionais de serviços.
    </p>

    <h2>Objetivos</h2>

    <ul>
      <li>Aprender tecnologia</li>
      <li>Construir MVPs</li>
      <li>Automatizar operações</li>
      <li>Validar ideias</li>
    </ul>

    <button id="btnMensagem" class="btn-primary">
      Clique aqui
    </button>

    <p id="mensagem"></p>

    <h2>Agendamento</h2>

    <form id="formAgenda">

      <input 
        type="text"
        id="nome"
        placeholder="Digite seu nome"
      >

      <input 
        type="text"
        id="servico"
        placeholder="Digite o serviço"
      >
      <input 
        type="time"
        id="horario"
      >

      <button type="submit" class="btn-primary">
        Agendar
      </button>

    </form>

    <p id="resposta"></p>
    <h3>Agendamentos</h3>
    <ul id="listaAgendamentos"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
